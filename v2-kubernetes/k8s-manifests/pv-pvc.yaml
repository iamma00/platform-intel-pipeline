apiVersion: v1
kind: PersistentVolume
metadata:
  name: address-data-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadOnlyMany
  nfs:
    server: 172.31.46.139
    path: /mnt/nfs-share/address-intel
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: address-data-pvc
  namespace: default
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 1Gi
  volumeName: address-data-pv
  storageClassName: ""
