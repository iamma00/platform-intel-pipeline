apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: address-classifier
  namespace: default
spec:
  type: Python
  mode: cluster
  image: "<your-dockerhub-username>/address-classifier:v1"
  imagePullPolicy: Always
  mainApplicationFile: local:///app/src/classify.py
  sparkVersion: 3.5.1
  sparkConf:
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.endpoint": "s3.ap-south-1.amazonaws.com"
  driver:
    cores: 1
    memory: 1g
    serviceAccount: spark-operator-spark
  executor:
    cores: 1
    instances: 2
    memory: 1g
